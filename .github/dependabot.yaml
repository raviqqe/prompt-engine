version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      codeql:
        patterns:
          - github/codeql-action/*
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    groups:
      vitest:
        patterns:
          - vitest
          - "@vitest/*"
